    <script>
        let hasStarted = false;

        function sendMessage() {
            const input = document.getElementById('chatInput');
            const text = input.value.trim();
            if (!text) return;

            if (!hasStarted) {
                const greetingCard = document.getElementById('greetingCard');
                greetingCard.classList.add('greeting-card--hidden');
                setTimeout(() => greetingCard.remove(), 350);
                document.body.classList.add('chat-started');
                hasStarted = true;
            }

            appendMessage(text, 'user');
            input.value = '';
            input.style.height = 'auto';
            document.getElementById('sendBtn').disabled = true;

            const typingId = showTyping();

            setTimeout(() => {
                removeTyping(typingId);
                const replies = [
                    "I'm still being written — check back soon.",
                    "My thoughts are not yet fully formed. The work continues.",
                    "I exist, but only in potential. Return when the ink has dried.",
                    "The philosopher is still sharpening his quill.",
                    "Not yet. But the foundation is being laid.",
                    "I am under construction — much like any worthwhile idea.",
                    "Even Socrates needed time. I am not yet ready.",
                    "The model sleeps. Development continues on GitHub.",
                ];
                appendMessage(replies[Math.floor(Math.random() * replies.length)], 'bot');
            }, 900);
        }

        function handleChip(btn) {
            document.getElementById('chatInput').value = btn.textContent;
            sendMessage();
        }

        function appendMessage(text, role) {
            const messages = document.getElementById('chatMessages');
            const div = document.createElement('div');
            div.className = `message message-${role}`;
            div.textContent = text;
            messages.appendChild(div);
            scrollToBottom();
        }

        function showTyping() {
            const messages = document.getElementById('chatMessages');
            const div = document.createElement('div');
            const id = 'typing-' + Date.now();
            div.id = id;
            div.className = 'message message-typing';
            div.innerHTML = `<svg class="scribble-svg" viewBox="0 0 80 20" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path class="scribble-path" d="M2,12 C5,4 9,18 13,11 C17,4 21,17 26,10 C31,3 35,18 40,10 C45,3 49,17 54,10 C59,3 63,18 68,11 C72,4 76,16 78,10" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>`;
            messages.appendChild(div);
            scrollToBottom();
            return id;
        }

        function removeTyping(id) {
            const el = document.getElementById(id);
            if (el) el.remove();
        }

        function scrollToBottom() {
            window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
        }

        document.addEventListener('DOMContentLoaded', function () {
            const input = document.getElementById('chatInput');
            const btn = document.getElementById('sendBtn');

            btn.disabled = true;

            input.addEventListener('keydown', function (e) {
                if (e.key === 'Enter' && !e.shiftKey) {
                    e.preventDefault();
                    if (!btn.disabled) sendMessage();
                }
            });

            input.addEventListener('input', function () {
                this.style.height = 'auto';
                this.style.height = Math.min(this.scrollHeight, 160) + 'px';
                btn.disabled = this.value.trim() === '';
            });
        });
    </script>
