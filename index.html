    <script>
        const API_BASE = 'http://localhost:8000';
        // const API_BASE = 'https://diogenes-server.joshnegreanu.com';
        const SESSION_ID = crypto.randomUUID();
        let hasStarted = false;
        let isGenerating = false;
        let userScrolledUp = false;

        window.addEventListener('scroll', () => {
            const threshold = 100;
            const atBottom = window.innerHeight + window.scrollY >= document.body.scrollHeight - threshold;
            userScrolledUp = !atBottom;
        }, { passive: true });

        // Kill the server-side session when the tab is closed
        window.addEventListener('beforeunload', () => {
            fetch(`${API_BASE}/session/${SESSION_ID}`, { method: 'DELETE', keepalive: true });
        });

        async function sendMessage() {
            if (isGenerating) return;

            const input = document.getElementById('chatInput');
            const text = input.value.trim();
            if (!text) return;

            if (!hasStarted) {
                const greetingCard = document.getElementById('greetingCard');
                greetingCard.classList.add('greeting-card--hidden');
                setTimeout(() => greetingCard.remove(), 350);
                document.body.classList.add('chat-started');
                hasStarted = true;
            }

            userScrolledUp = false;
            appendMessage(text, 'user');
            input.value = '';
            input.style.height = 'auto';

            const btn = document.getElementById('sendBtn');
            btn.disabled = true;
            isGenerating = true;

            const typingId = showTyping();

            try {
                const response = await fetch(`${API_BASE}/chat/stream`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: text, session_id: SESSION_ID }),
                });

                if (!response.ok) throw new Error(`Server error: ${response.status}`);

                removeTyping(typingId);
                const botDiv = appendMessage('', 'bot');

                const reader = response.body.getReader();
                const decoder = new TextDecoder();
                let buffer = '';

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;

                    buffer += decoder.decode(value, { stream: true });

                    // SSE lines arrive as "data: <token>\n\n"
                    const lines = buffer.split('\n');
                    buffer = lines.pop(); // keep any incomplete line for the next chunk

                    for (const line of lines) {
                        if (line.startsWith('data: ')) {
                            botDiv.textContent += JSON.parse(line.slice(6));
                            scrollToBottom();
                        }
                    }
                }
            } catch (err) {
                removeTyping(typingId);
                appendMessage('Sorry, I am not online. Please try again.', 'bot');
                console.error(err);
            } finally {
                isGenerating = false;
                btn.disabled = input.value.trim() === '';
            }
        }

        function handleChip(btn) {
            document.getElementById('chatInput').value = btn.textContent;
            sendMessage();
        }

        // Returns the created div so the caller can stream text into it
        function appendMessage(text, role) {
            const messages = document.getElementById('chatMessages');
            const div = document.createElement('div');
            div.className = `message message-${role}`;
            div.textContent = text;
            messages.appendChild(div);
            scrollToBottom();
            return div;
        }

        function showTyping() {
            const messages = document.getElementById('chatMessages');
            const div = document.createElement('div');
            const id = 'typing-' + Date.now();
            div.id = id;
            div.className = 'message message-typing';
            div.innerHTML = `<svg class="scribble-svg" viewBox="0 0 80 20" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path class="scribble-path" d="M2,12 C5,4 9,18 13,11 C17,4 21,17 26,10 C31,3 35,18 40,10 C45,3 49,17 54,10 C59,3 63,18 68,11 C72,4 76,16 78,10" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>`;
            messages.appendChild(div);
            scrollToBottom();
            return id;
        }

        function removeTyping(id) {
            const el = document.getElementById(id);
            if (el) el.remove();
        }

        function scrollToBottom() {
            if (!userScrolledUp) {
                window.scrollTo({ top: document.body.scrollHeight, behavior: 'instant' });
            }
        }

        document.addEventListener('DOMContentLoaded', function () {
            const input = document.getElementById('chatInput');
            const btn = document.getElementById('sendBtn');

            btn.disabled = true;

            input.addEventListener('keydown', function (e) {
                if (e.key === 'Enter' && !e.shiftKey) {
                    e.preventDefault();
                    if (!btn.disabled && !isGenerating) sendMessage();
                }
            });

            input.addEventListener('input', function () {
                this.style.height = 'auto';
                this.style.height = Math.min(this.scrollHeight, 160) + 'px';
                btn.disabled = this.value.trim() === '';
            });
        });
    </script>
